<!DOCTYPE html>
<html lang="tr">
<head>

  <meta name="robots" content="noindex">

  <link rel="stylesheet" href="/css/style.css">
  <style>
    .notfound {
      min-height: 100svh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem 1.5rem;
    }
    .notfound img { width: 130px; margin-bottom: 2rem; }
    .notfound h1 { font-size: clamp(2rem, 5vw, 3rem); max-width: 20ch; }
    .notfound p { color: var(--ink-soft); max-width: 50ch; margin-bottom: 2rem; }

  </style>
</head>
<body>
  <main class="notfound">
    <picture>
      <source srcset="/img/logo-bear.webp" type="image/webp">
      <img src="/img/logo-bear.png" alt="Maison Sara ayıcık logosu">
    </picture>
    <h1>Aradığınız sayfa bulunamadı</h1>

    <div class="hero-cta">
      <a class="btn btn-solid" href="/">Ana Sayfa</a>

  </main>
